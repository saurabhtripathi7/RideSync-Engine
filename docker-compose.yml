services:
  postgres:
    image: postgres:17
    container_name: airport-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airport_pooling

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: airport-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  postgres_data: