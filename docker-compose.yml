services:
  postgres:
    image: postgres:17
    container_name: airport-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airport_pooling

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: airport-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: airport-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"       # AMQP protocol port (your app connects here)
      - "15672:15672"     # Management UI (browser: localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  postgres_data: